    function reduceToDigit(num, respectMaster = true) {
        if (respectMaster && (num === 11 || num === 22 || num === 33)) return num;
        while (num > 9 && !(respectMaster && (num === 11 || num === 22 || num === 33))) {
            num = String(num).split('').reduce((a,b) => a + parseInt(b), 0);
        }
        return num;
    }

    function calculateLifePath(birthDate) {
        let [year, month, day] = birthDate.split('-').map(n => parseInt(n,10));
        // month: already number, day: number
        let monthVal = month;  // no reduction until summing
        let dayVal = day;
        let yearVal = year;
        // reduce each component to single digit / master
        let mRed = reduceToDigit(monthVal);
        let dRed = reduceToDigit(dayVal);
        let yRed = reduceToDigit(yearVal);
        let total = mRed + dRed + yRed;
        return reduceToDigit(total);
    }

    }
