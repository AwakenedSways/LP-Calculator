        /* TRUE STARRY BACKGROUND – multiple layers of moving stars */
        body::before {
            content: "";

                radial-gradient(3px 3px at 5% 92%, rgba(255,255,200,0.7) 1px, transparent 0),

                radial-gradient(2px 2px at 33% 67%, rgba(230,240,255,0.8) 1px, transparent 0),
                radial-gradient(2px 2px at 22% 18%, rgba(255,255,255,0.7) 1px, transparent 0),
                radial-gradient(3px 3px at 95% 15%, rgba(200,210,255,0.8) 1px, transparent 0),

            pointer-events: none;
            z-index: -2;
            animation: subtleTwinkle 8s infinite alternate;

        /* additional nebula glow */
        body::after {
            content: "";

            if (respectMaster && (num === 11 || num === 22 || num === 33)) return num;
            while (num > 9 && !(respectMaster && (num === 11 || num === 22 || num === 33))) {
                num = String(num).split('').reduce((a,b) => a + parseInt(b), 0);
            }
            return num;
